<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page Not Found — TulsiX Technologies</title>
<meta name="robots" content="noindex">
<link rel="icon" type="image/svg+xml" href="/tulsix-favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --slate-950:#0E1017;--slate-900:#131620;--slate-800:#1A1E2E;--slate-700:#2C3040;--slate-600:#3D4258;--slate-400:#7E8399;--slate-300:#A8ABBA;
  --teal:#5DCAA5;--teal-light:#7EDABC;--teal-dim:rgba(93,202,165,.12);
  --white:#F8F9FA;
  --font-primary:'Sora',system-ui,sans-serif;
  --font-mono:'JetBrains Mono',monospace;
}
body{font-family:var(--font-primary);background:var(--slate-950);color:var(--white);display:flex;align-items:center;justify-content:center;min-height:100vh;text-align:center;padding:2rem;-webkit-font-smoothing:antialiased}
.container{max-width:500px}
.error-code{font-family:var(--font-mono);font-size:8rem;font-weight:800;color:var(--teal);line-height:1;letter-spacing:-.05em;opacity:.15;margin-bottom:-1rem}
h1{font-size:1.8rem;font-weight:800;color:var(--white);margin-bottom:.8rem;letter-spacing:-.02em}
p{font-size:.95rem;color:var(--slate-300);line-height:1.7;margin-bottom:2rem}
.links{display:flex;gap:1rem;justify-content:center;flex-wrap:wrap}
.btn-teal{display:inline-flex;align-items:center;gap:.5rem;background:var(--teal);color:var(--slate-950);padding:.8rem 1.8rem;border-radius:8px;font-family:var(--font-primary);font-size:.88rem;font-weight:700;text-decoration:none;transition:all .3s}
.btn-teal:hover{background:var(--teal-light);transform:translateY(-2px);box-shadow:0 8px 30px rgba(93,202,165,.25)}
.btn-ghost{display:inline-flex;align-items:center;gap:.5rem;background:transparent;color:var(--white);padding:.8rem 1.8rem;border:1.5px solid var(--slate-600);border-radius:8px;font-family:var(--font-primary);font-size:.88rem;font-weight:600;text-decoration:none;transition:all .3s}
.btn-ghost:hover{border-color:var(--teal);color:var(--teal);background:var(--teal-dim)}
.brand{margin-top:3rem;display:flex;align-items:center;justify-content:center;gap:.5rem;opacity:.4}
.brand span{font-size:.85rem;font-weight:700;color:var(--white);letter-spacing:-.02em}
.brand .x{color:var(--teal)}
</style>
</head>
<body>
<div class="container">
  <div class="error-code">404</div>
  <h1>Page Not Found</h1>
  <p>The page you're looking for doesn't exist or has been moved. Let's get you back on track.</p>
  <div class="links">
    <a href="/" class="btn-teal">Go to Homepage</a>
    <a href="/blog/" class="btn-ghost">Read Our Blog</a>
  </div>
  <div class="brand">
    <svg viewBox="0 0 64 64" width="24" height="24" xmlns="http://www.w3.org/2000/svg"><rect width="64" height="64" rx="14" fill="#2C2C2C"/><g transform="translate(12,10) scale(0.27)"><path d="M30 0 Q74 55 74 120 Q74 130 64 130 Q58 130 50 120 Q10 55 30 0Z" fill="#1D9E75" opacity="0.85"/><path d="M118 0 Q74 55 74 120 Q74 130 84 130 Q90 130 98 120 Q138 55 118 0Z" fill="#0F6E56" opacity="0.85"/><path d="M74 50 Q62 75 74 100 Q86 75 74 50Z" fill="#085041" opacity="0.4"/></g></svg>
    <span>Tulsi<span class="x">X</span></span>
  </div>
</div>
</body>
</html>
